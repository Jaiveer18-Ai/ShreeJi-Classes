<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ShreeJi Classes - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;min-height:100vh;background:linear-gradient(135deg,#4338CA,#6366F1,#059669);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:28px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.25)}
.logo{text-align:center;margin-bottom:28px}
.logo .icon{width:80px;height:80px;background:linear-gradient(135deg,#6366F1,#4338CA);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:36px;color:#fff;font-weight:800;box-shadow:0 8px 24px rgba(99,102,241,0.3)}
.logo h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#4338CA,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.logo p{font-size:13px;color:#64748B;margin-top:2px}
h2{text-align:center;font-size:20px;color:#0F172A;margin-bottom:4px}
.sub{text-align:center;color:#64748B;font-size:13px;margin-bottom:24px}
.field{position:relative;margin-bottom:18px}
.field input{width:100%;padding:14px 16px 14px 48px;border:1.5px solid #E2E8F0;border-radius:14px;font-size:15px;font-family:inherit;transition:all .3s;outline:none;background:#F8FAFC}
.field input:focus{border-color:#6366F1;background:#fff;box-shadow:0 0 0 3px #EEF2FF}
.field .material-icons-round{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:22px}
.field input:focus ~ .material-icons-round{color:#6366F1}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#818CF8,#4338CA);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,0.45)}
.btn-primary:active{transform:scale(0.98)}
.error{color:#DC2626;font-size:13px;text-align:center;margin-bottom:12px;display:none}
.demo{margin-top:24px;background:#EEF2FF;border-radius:14px;padding:14px;font-size:12px}
.demo h4{color:#4338CA;margin-bottom:6px;font-size:13px}
.demo p{color:#475569;margin:2px 0}
.toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94A3B8;font-size:20px;background:none;border:none}
</style></head><body>
<div class="login-box">
  <div class="logo"><img src="/logo.jpg" alt="ShreeJi" style="width:90px;height:90px;border-radius:22px;object-fit:cover;box-shadow:0 8px 24px rgba(99,102,241,0.3)"><h1>SHREE JI CLASSES</h1><p>"संस्कार से शिक्षा तक"</p></div>
  <h2>Welcome Back!</h2><p class="sub">Login to continue</p>
  <div id="error" class="error"></div>
  <form id="loginForm">
    <div class="field"><span class="material-icons-round">person</span><input type="text" id="userId" placeholder="User ID" required autocomplete="username"></div>
    <div class="field"><span class="material-icons-round">lock</span><input type="password" id="password" placeholder="Password" required autocomplete="current-password"><button type="button" class="toggle-pwd" onclick="togglePwd()"><span class="material-icons-round">visibility</span></button></div>
    <button type="submit" class="btn btn-primary">LOGIN</button>
  </form>

</div>
<script>
function togglePwd(){const i=document.getElementById('password');const b=document.querySelector('.toggle-pwd .material-icons-round');if(i.type==='password'){i.type='text';b.textContent='visibility_off'}else{i.type='password';b.textContent='visibility'}}
document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();const err=document.getElementById('error');err.style.display='none';
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:document.getElementById('userId').value.trim(),password:document.getElementById('password').value.trim()})});
  const d=await r.json();if(!r.ok){err.textContent=d.error;err.style.display='block';return}
  window.location.href=d.user.role==='ADMIN'?'/admin.html':d.user.role==='TEACHER'?'/teacher.html':'/student.html'}catch(e){err.textContent='Connection error';err.style.display='block'}};
fetch('/api/session').then(r=>r.json()).then(d=>{if(d.user)window.location.href=d.user.role==='ADMIN'?'/admin.html':d.user.role==='TEACHER'?'/teacher.html':'/student.html'});
</script></body></html>
